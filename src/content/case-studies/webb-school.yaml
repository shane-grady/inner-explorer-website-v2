intro:
  challenge:
    eyebrow: 'The Challenge'
    heading: "Points and levels couldn't reach what students carried inside"
    body:
      - >-
        The Webb School in the Valley — together with The Webb School at Cheshire and The
        Grace S. Webb School in Hartford — is part of the Institute of Living in Hartford,
        Connecticut. These schools exist to help students with mental health challenges
        realize their potential and become self-regulated in a safe, supportive, and
        respectful special-education setting.
      - >-
        In working through student challenges, staff recognized the need for a support
        system that could translate beyond the classroom. Rather than trying to change
        behavior through external factors — like a point and level system — they set out to
        transform behavior from the inside out, through social-emotional learning and the
        development of coping strategies students could carry anywhere.
    image: '../../assets/images/case-studies/webb-school/challenge-supported-student.jpg'
    imageAlt: 'A teacher gently supporting a student at a desk in a small, calm classroom'
    stat: { value: '180', label: 'restraints & seclusions in the year before daily practice' }
  approach:
    eyebrow: 'The Approach'
    heading: 'One consistent daily practice — not mindfulness in pockets'
    body:
      - >-
        Some school counselors were already using mindfulness in isolated instances. But
        School Administrator Jill DeVane knew that a consistent practice for all students
        was the key to maximizing what mindfulness has to offer. Inner Explorer's
        Mindfulness-Based Social Emotional Learning (MBSEL) program fit: daily 5–10 minute
        audio-guided practices that ask nothing of educators but to press play.
      - >-
        Through the generosity of the Aetna Foundation and LG Electronics, the school
        piloted Inner Explorer at no cost. Layered onto the educators' existing relational
        model and trauma-informed teaching, the practice found its place at the same time
        each day, in every classroom — and four strategies made it stick.
    image: '../../assets/images/case-studies/webb-school/approach-drawing-while-listening.jpg'
    imageAlt: 'A student drawing at a desk while listening to an audio-guided mindfulness practice'
    pillars:
      - icon: 'calendar'
        title: 'Structure'
        text: >-
          The same time each day in every classroom, students and teachers practicing
          together — a set routine that sets the stage for a productive day of learning.
      - icon: 'palette'
        title: 'Adaptation'
        text: >-
          Students who find it hard to sit still with their thoughts can draw or color
          while they listen. Participation over perfection.
      - icon: 'heart'
        title: 'Support'
        text: >-
          When a student resists the practice, educators work to understand the underlying
          reason — and build the "why" that helps the exercises make sense.
      - icon: 'compass'
        title: 'Application'
        text: >-
          The day's technique goes on the board — belly breathing, a body scan — so hard
          moments can route back to it. Older students practice on their own devices
          whenever they feel anxious, stressed, or overwhelmed.

timeline:
  eyebrow: 'The Turnaround'
  heading: 'From 180 incidents a year to a culture of self-regulation'
  phases:
    - date: '2016–2018'
      tag: 'Baseline'
      title: 'Rising incidents under the old system'
      text: 'Restraints and seclusions climb from 116 to 180 per year while the school works through external behavior systems — points, levels, and consequences.'
    - date: 'Fall 2018'
      tag: 'Pilot'
      title: 'Daily practice begins — at no cost'
      text: "Funded by the Aetna Foundation and LG Electronics, every classroom adds a 5–10 minute audio-guided practice at the same time each day. Counselors' isolated mindfulness moments become a whole-school routine."
    - date: '2018–19'
      tag: 'Proof'
      title: 'Restraints and seclusions fall 65%'
      text: 'Incidents drop from 180 to 62 in the first year of daily practice. One student goes from 40+ restraint-or-seclusion outbursts to a single one.'
    - date: '2019–20'
      tag: 'Sustain'
      title: 'The new normal holds'
      text: "A second year of daily practice keeps incidents at 63 — evidence the first year's drop was a habit, not a novelty effect."
    - date: '2020–21'
      tag: 'Resilience'
      title: 'The habit survives COVID-19'
      text: 'Practice continues through remote learning, and incidents stay near pilot-year lows during the most stressful school year in memory. After the return to in-person learning, they remain low.'

