intro:
  challenge:
    eyebrow: 'The Challenge'
    heading: "Point and level systems couldn't reach what students carried inside"
    body:
      - >-
        The Webb School in the Valley is a therapeutic special-education school, part of
        the Institute of Living in Hartford, Connecticut, and one of three Webb schools
        alongside The Webb School at Cheshire and The Grace S. Webb School in Hartford.
        These schools exist to help students with mental health challenges realize their
        potential and become self-regulated in a safe, supportive, and respectful setting.
      - >-
        When a crisis escalated past what words could reach, staff were left with the
        interventions of last resort: a restraint — physically holding a student until
        they are safe — or a seclusion, placing a student alone in a separate space. In
        the 2017–18 school year, that happened 180 times. Federal guidance is blunt about
        these interventions: there is no evidence that restraint or seclusion reduces the
        behaviors that trigger them.
      - >-
        Staff recognized that external motivators — points, levels, consequences —
        weren't enough, and set out to transform behavior from the inside out: through
        social-emotional learning (SEL) and coping strategies students could carry beyond
        the classroom.
    image: '../../assets/images/case-studies/webb-school/challenge-supported-student.jpg'
    imageAlt: 'A teacher gently supporting a student at a desk in a small, calm classroom'
    stat: { value: '180', label: 'restraints & seclusions in the year before daily practice' }
  approach:
    eyebrow: 'The Approach'
    heading: 'One consistent daily practice — not mindfulness in pockets'
    body:
      - >-
        Some school counselors were already using mindfulness in isolated instances. But
        School Administrator Jill DeVane knew that a consistent, school-wide practice — a
        universal Tier 1 support for every student, not a pull-out intervention — was the
        key to maximizing what mindfulness has to offer. Inner Explorer's
        Mindfulness-Based Social Emotional Learning (MBSEL) program fit: daily 5–10 minute
        audio-guided practices that ask nothing of educators but to press play.
      - >-
        Through grant funding from the Aetna Foundation and LG Electronics, the school
        piloted Inner Explorer at no cost. Layered onto the educators' existing relational
        model and trauma-informed teaching, the practice found its place at the same time
        each day, in every classroom. Four implementation strategies — structure,
        adaptation, support, and application — made it stick.
    image: '../../assets/images/case-studies/webb-school/approach-drawing-while-listening.jpg'
    imageAlt: 'A student drawing at a desk while listening to an audio-guided mindfulness practice'
    # Card titles are descriptive takeaways (what skimming administrators retain);
    # the source taxonomy — structure / adaptation / support / application — is named
    # in the approach body paragraph above.
    pillars:
      - icon: 'calendar'
        title: 'A predictable daily routine'
        text: >-
          The practice happens at the same time each day, in every classroom, with
          students and teachers practicing together. That predictability is what turns
          5–10 minutes of mindfulness into a school-wide habit — and sets the stage for a
          productive day of learning.
      - icon: 'palette'
        title: 'Accommodations, not exemptions'
        text: >-
          Students who find it hard to sit still with their thoughts can draw or color
          while they listen. Participation over perfection — the accommodation keeps
          students in the practice instead of opting out.
      - icon: 'heart'
        title: 'Buy-in before compliance'
        text: >-
          When a student resists the practice, educators work to understand the
          underlying reason rather than insisting. Building the "why" is what helps the
          exercises make sense — and stick.
      - icon: 'compass'
        title: 'Skills that transfer'
        text: >-
          The day's technique goes on the board — belly breathing, a body scan — so
          students can de-escalate hard moments with a tool they already know. Older
          students practice independently on their own devices whenever they feel
          anxious, stressed, or overwhelmed.

timeline:
  eyebrow: 'The Turnaround'
  heading: 'From 180 incidents a year to a culture of self-regulation'
  phases:
    - date: '2016–2018'
      tag: 'Baseline'
      title: 'Restraints and seclusions climb to 180 a year'
      text: "Incidents rise from 116 to 180 per year while the school works through external behavior systems — points, levels, and consequences that couldn't reach the cause."
    - date: 'Fall 2018'
      tag: 'Pilot'
      title: 'Daily mindfulness begins — at no cost'
      text: "Funded by grants from the Aetna Foundation and LG Electronics, every classroom adds a 5–10 minute audio-guided mindfulness practice at the same time each day. Counselors' isolated mindfulness moments become a whole-school routine."
    - date: '2018–19'
      tag: 'Proof'
      title: 'Restraints and seclusions fall 65%'
      text: 'In the first year of daily practice, restraints and seclusions at the Webb School fall from 180 to 62 — a 65% reduction. One student goes from 40+ restraint-or-seclusion outbursts to a single one.'
    - date: '2019–20'
      tag: 'Sustain'
      title: 'The new normal holds'
      text: "A second year of daily practice keeps incidents at 63 — evidence the first year's drop was a habit, not a novelty effect."
    - date: '2020–21'
      tag: 'Resilience'
      title: 'The habit survives COVID-19'
      text: 'Practice continues through remote learning, and incidents hold at 68 — near pilot-year lows — during the most stressful school year in memory. After the return to in-person learning, they remain low.'

