voices:
  - kind: 'Leadership'
    quote: >-
      One student with extreme social anxiety had 40+ outbursts resulting in restraint or
      seclusion the year before Inner Explorer. The year we began practicing, he had ONE.
      The change was so significant that his mother asked why she wasn't talking to us as
      much — we had no behavior issues to review with her.
    name: 'Jill DeVane'
    role: 'School Administrator'
    org: 'The Webb School in the Valley'
    # PUBLISH GATE: placeholder portrait — must be Jill DeVane's real photo before
    # launch (a stand-in face with an identity-asserting alt is a fabrication risk).
    # Alt text stays non-identifying until the real photo lands.
    portrait: '../../assets/images/case-studies/webb-school/voice-devane.jpg'
    portraitAlt: 'Portrait of a school administrator (placeholder image)'
    stat: { value: '40+ → 1', label: 'restraints & seclusions for that student' }
  - kind: 'Juvenile justice'
    quote: >-
      Students need tools that help them slow down, make better choices, and avoid acting
      out of anger. Mindfulness teaches exactly that. As a juvenile judge, I work with some
      of the most troubled youth in America — if we can teach them to practice mindfulness,
      they will have a better chance to be successful, law-abiding citizens.
    name: 'Judge Frank Szymanski'
    role: 'Third Circuit Court, Juvenile Division'
    # PUBLISH GATE: placeholder portrait — same rule as above.
    portrait: '../../assets/images/case-studies/webb-school/voice-szymanski.jpg'
    portraitAlt: 'Portrait of a judge (placeholder image)'
    stat: { value: '10×', label: 'higher dropout risk after exclusionary discipline' }
  # PUBLISH GATE (SEO/E-E-A-T audit, high severity): representative student voices —
  # the legacy case study has no student quotes; these names/grades are invented.
  # Replace with real, consented quotes before launch or delete the three entries
  # (the section renders cleanly with just the two adult voices above).
  - kind: 'From the students'
    quote: 'When it gets loud in my head, the breathing makes it quieter. I can stay in the room now.'
    name: 'Elijah'
    role: 'Grade 6'
  - kind: 'From the students'
    quote: 'I used to leave class when I got upset. Now I draw while I listen, and I stay.'
    name: 'Maya'
    role: 'Grade 4'
  - kind: 'From the students'
    quote: "The body scan is my favorite. I do it before tests, and when I'm mad it helps me think again."
    name: 'Devon'
    role: 'Grade 8'

