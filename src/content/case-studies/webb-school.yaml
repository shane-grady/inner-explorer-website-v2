# FAQ — real buyer questions (training, cost, durability) answered from established
# facts only; rendered with the shared FAQAccordion. Deliberately NO FAQPage JSON-LD
# (restricted to gov/health rich results since 2023 — the visible copy is the asset).
faq:
  eyebrow: 'FAQ'
  titleHtml: 'The questions <em>school leaders ask about this story.</em>'
  intro: >-
    Direct answers from the Webb School's implementation — what the daily practice asked
    of educators, what it cost, and whether the results held.
  items:
    - q: 'How did The Webb School in the Valley reduce restraints and seclusions by 65%?'
      a: >-
        By adding one consistent routine: a 5–10 minute audio-guided Inner Explorer
        mindfulness practice at the same time each day, in every classroom, layered onto
        the school's existing trauma-informed teaching. Restraints and seclusions fell
        from 180 in the year before daily practice to 62 in the first year.
    - q: 'What is Mindfulness-Based Social Emotional Learning (MBSEL)?'
      a: >-
        MBSEL is social-emotional learning built on daily mindfulness practice rather
        than occasional lessons. Inner Explorer delivers it as a 5–10 minute audio-guided
        practice every school day, building self-regulation skills — belly breathing,
        body scans — that students can reach for whenever they feel anxious, stressed, or
        overwhelmed.
    - q: 'How much training did teachers need to run the daily practice?'
      a: >-
        None beyond pressing play. The practices are fully audio-guided — no prep, no
        script, no curriculum to deliver. At Webb, educators practice alongside their
        students, and the day's technique goes on the board so hard moments can route
        back to it.
    - q: 'What did the pilot cost the school?'
      a: >-
        Nothing. The Webb School's 2018 pilot was funded by the Aetna Foundation and LG
        Electronics, so the school ran Inner Explorer at no cost. Districts typically
        fund the program through sources like Title IV-A (Safe and Healthy Students),
        school mental-health funds, and state SEL line items — our partnerships team
        helps identify the right one.
    - q: 'Did the reduction in restraints and seclusions last?'
      a: >-
        Yes. After falling 65% in the first year of daily practice, incidents held at 63
        the following year and stayed near pilot-year lows — 68 — through the COVID-19
        school year, including remote learning.

