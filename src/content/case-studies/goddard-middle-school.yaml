      text: >-
        The Colorado Department of Education contacts Goddard's principal to ask what
        the school is doing — Goddard is outperforming most middle schools in the state
        with the same demographic profile. The principal credits the daily mindfulness
        practice through Inner Explorer.
    - date: 'Today'
      tag: 'Sustain'
      title: 'The playbook stands'
      text: >-
        Goddard still serves grades 6–8 in Littleton today. LG's Experience Happiness
        funding carried the daily practice through the years this case study documents
        — and the four key findings from the rollout remain a guide for any school
        community.

