# Source notes: the legacy WEB page swaps two section headers relative to the PDF
# ("Modifications for a Unique Population" vs "Educating School Staff and
# Families"); this page follows the PDF's logical pairing. The 2016 start year is
# inferred from "within two years" + the 2016–2018 measurement window (REVIEW
