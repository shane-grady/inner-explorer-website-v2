faq:
  eyebrow: 'FAQ'
  titleHtml: 'The questions <em>school leaders ask about this story.</em>'
  intro: >-
    Direct answers from Goddard's implementation — what MBSEL is, what the program
    asked of teachers, what it cost, and how a high-need population made it work.
  items:
    - q: 'How did Goddard Middle School earn state recognition in academics?'
      a: >-
        Between 2016 and 2018 — within two years of beginning the daily practice —
        Goddard's growth in students meeting or exceeding expectations ran 3X the
        Colorado average in English language arts and math, and 5X in science. The
        results were significant enough that the Colorado Department of Education
        contacted the principal to ask what the school was doing — Goddard was
        outperforming most middle schools in the state with the same demographic
        profile, and the principal credited the daily mindfulness practice through
        Inner Explorer.
    - q: 'What is Mindfulness-Based Social Emotional Learning (MBSEL)?'
      a: >-
        MBSEL is social-emotional learning built on daily mindfulness practice rather
        than lessons alone. Traditional SEL activates the prefrontal cortex — but under
        stress the prefrontal cortex goes inactive, so students can't access what they
        know. Inner Explorer's 5–10 minute daily audio-guided practice teaches students
        to self-regulate in exactly those moments.
    - q: 'Does MBSEL replace an existing SEL curriculum?'
      a: >-
        No — it complements one. Goddard kept its SEL lessons and ran the daily
        practice right before or after them: before, students calm down and prepare to
        learn; after, they reflect on and absorb what they just learned. In MTSS terms,
        the daily classroom practice served every student as a Tier 1 universal
        support, while counselors used the same practices in Tier 2 small-group
        sessions.
    - q: 'What did the program cost the school?'
      a: >-
        Nothing. Goddard implemented Inner Explorer at no cost through the generosity
        of LG Electronics USA's Experience Happiness initiative. Districts typically
        fund the program through sources like Title IV, Part A (Student Support and
        Academic Enrichment), school mental-health funds, and state SEL line items —
        our partnerships team helps identify the right one.
    - q: 'How did Goddard adapt the practice for students experiencing trauma?'
      a: >-
        Staff brainstormed a trauma-sensitive integration as a team, building in the
        choice and safety that trauma-informed practice calls for. A student who feels
        upset sits somewhere they feel safe and listens to a practice until they're
        ready to talk; students uncomfortable closing their eyes or sitting still color
        or doodle while they listen. Teachers noticed students were calmer and less
        reactive during the day.
    - q: 'How much training did teachers need to run the daily practice?'
      a: >-
        Almost none — the practices are fully audio-guided, and in the words of a
        Goddard counselor, "mindfulness skills are easy to learn through Inner
        Explorer." Leadership held one presentation so staff and families understood
        the research and benefits, then classrooms simply pressed play.

