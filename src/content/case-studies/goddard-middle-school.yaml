        the district's highest concentrations of students receiving special education
        services, students experiencing trauma, and students on the free lunch program.
    - date: '2016'
      tag: 'Pilot'
      title: 'Daily MBSEL begins — at no cost'
      text: >-
        Funded by LG Electronics USA, educators and counselors add Inner Explorer's
        5–10 minute audio-guided practice to classrooms and small-group sessions,
        running it before or after each SEL lesson.
    - date: '2016–2018'
      tag: 'Growth'
      title: 'Academic gains run 3X the state average'
      text: >-
        Within two years of the first daily practice, Goddard's growth in students
        meeting or exceeding expectations runs 3X the Colorado average in English
        language arts and math — 5X in science, and 8X in 8th-grade English language
        arts.
    - date: '2018'
