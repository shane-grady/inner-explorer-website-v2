intro:
  challenge:
    eyebrow: 'The Background'
    heading: "One school carried the district's highest concentrations of student need"
    body:
      - >-
        Goddard Middle School is a public middle school in Littleton, Colorado, part of
        Littleton Public Schools, serving students in grades 6–8. No school in the
        district has a higher percentage of students receiving special education
        services, students experiencing trauma, or students on the free lunch program.
      - >-
        The student body also spans a wide economic divide — students from very poor
        families learn alongside students from very wealthy ones. School staff see that
        diversity as one of the things that makes Goddard great, and they also know that
        bringing students from such different backgrounds together can raise issues.
      - >-
        Staff were already facilitating social emotional learning (SEL) lessons. But
        traditional SEL is designed to activate the prefrontal cortex — the brain's
        executive center — and when the brain is stressed, the prefrontal cortex becomes
        inactive. In a stressful moment, students couldn't access what they cognitively
        knew, leaving them prone to reactivity exactly when their skills mattered most.
    image: '../../assets/images/case-studies/goddard-middle-school/challenge-diverse-classroom.jpg'
    imageAlt: 'A diverse group of middle school students working together in a classroom'
    stat:
      {
        value: '6–8',
        label: "grades served — with the district's highest share of special-education, trauma-affected, and free-lunch students",
      }
  approach:
    eyebrow: 'The Approach'
    heading: 'From SEL lessons to daily Mindfulness-Based SEL in every classroom'
    body:
      - >-
        After Inner Explorer was introduced, Goddard's focus shifted from SEL lessons
        alone to incorporating Mindfulness-Based Social Emotional Learning (MBSEL) into
        every classroom, supporting student and educator well-being. The daily 5–10
        minute audio-guided practice runs either before or after an SEL lesson — calming
        students and preparing them to learn, or letting them reflect on what they just
        learned. MBSEL targets the stress disconnect directly, teaching strategies to
        self-regulate in the moments when the thinking brain goes offline.
      - >-
        Goddard implemented the program at no cost through LG Electronics USA's
        "Life's Good: Experience Happiness" initiative — funding that continued
        throughout the period this case study documents. Both educators and counselors
        use Inner Explorer, in classrooms and in small-group sessions. Leadership made
        sure school staff and families were knowledgeable about mindfulness, holding a
        presentation on MBSEL's research and benefits and answering every question
        families had about practicing.
      - >-
        Considering Goddard's high percentage of students facing trauma and adversity,
        staff worked together to brainstorm a strategy sensitive to their students'
        needs. A student who feels upset or has an emotional outburst is asked to sit
        somewhere they feel safe and listen to a mindfulness practice until they're
        ready to talk; students uncomfortable closing their eyes or sitting still are
        encouraged to color or doodle while they listen. Teachers noticed students were
        more calm and less reactive during the day.
    image: '../../assets/images/case-studies/goddard-middle-school/approach-doodling-while-listening.jpg'
    imageAlt: 'A middle school student doodling at a desk while listening to an audio-guided mindfulness practice'
    # Card titles carry the source's own "Key Findings" — the four-item playbook the
    # legacy case study offers any school community integrating MBSEL.
    pillars:
      - icon: 'heart'
        title: 'Elect a champion'
        text: >-
          Put someone dedicated behind the program. At Goddard, counselors and school
          leadership owned the rollout — from classroom practice to the family
          presentation — and made its success their job.
      - icon: 'repeat'
        title: 'Complement what already works'
        text: >-
          Brainstorm how MBSEL can complement an existing program, such as SEL lessons.
          Goddard ran its daily practice right before or after the SEL lesson, making
          the transition easier for students and educators alike.
      - icon: 'palette'
        title: 'Adapt to your students'
        text: >-
          Meet the needs of the students within the community: a safe place to listen
          for a student who is upset, and coloring or doodling for students who aren't
          ready to sit still with their eyes closed.
      - icon: 'compass'
        title: 'Communicate the why and how'
        text: >-
          Goddard leadership held a presentation for staff and families on the research
          and benefits behind MBSEL — and made sure every family had the opportunity to
          ask questions.

