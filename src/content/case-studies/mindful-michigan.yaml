intro:
  challenge:
    eyebrow: 'The Challenge'
    heading: 'Stress blocks thinking, learning, and relating — and no single school can fix that alone'
    body:
      - >-
        The youth mental health crisis is a significant factor linked to academic
        failure, and Michigan's classrooms felt it daily. The CDC's 2023 action guide
        for school and district leaders lists "Promote Mindfulness" second among its
        six strategies (ahead of social, emotional, and behavioral learning) and
        dedicates its sixth strategy to staff well-being, beginning with
        mindfulness-based training. Mindful Michigan starts from a simple premise:
        stress blocks thinking, learning, and relating — so schools must address
        biology before behavior, reducing the effects of stress before expecting
        students to show up ready to learn.
      - >-
        The before picture was stark. Schools that would later adopt Inner Explorer
        were underperforming demographically matched peer schools on statewide
        measures. In Southfield Public Schools — then 14 schools and more than 5,000
        students, 98% minority enrollment — the district ranked in the bottom half of
        the state, with 20% math proficiency and 36% reading proficiency.
      - >-
        And scale itself was the hardest problem. Even when a mindfulness program is
        offered free through grant funding, not every school fully engages. Reaching a
        whole state takes more than a good practice — it takes a model: funders,
        training partners, data, and districts willing to lead.
    image: '../../assets/images/case-studies/mindful-michigan/challenge-stress-classroom.jpg'
    imageAlt: 'A teacher kneeling beside a young student to offer calm support in a busy elementary classroom'
    stat:
      {
        value: '20%',
        label: 'math proficiency in Southfield Public Schools before its mindful-district commitment',
      }
  approach:
    eyebrow: 'The Approach'
    heading: 'A six-part statewide model built on one daily mindfulness practice'
    body:
      - >-
        The Mindful Michigan Model is a state-level framework for mindful systems
        change, built on a decade of Inner Explorer's evidence-based program. Its six
        components work inside-out: Foundational Daily Mindful Practice — 180 days of
        sequenced, 10-minute audio-guided practices in every classroom — supported by
        Data-Driven Research, an Inter-generational Approach linking home and school,
        Intentional Equity and Inclusion, Inspired Innovation, and Collaboration and
        Collective Impact across public and private partners.
      - >-
        Funders and partners made the model possible — the Fetzer Institute, the Hemera
        Foundation, and the Skillman Foundation alongside training partners MC4ME,
        Millennium Forum, and Breathe for Change. Innovation kept it alive: Fortis
        Academy ran a Mindful March Madness challenge, Adler Elementary won Southfield's
        district-wide Winter Challenge by getting its entire staff practicing daily, and
        the IN-SPIRE Story Quest drew more than 40 student and educator entries from
        across the state. A Detroit Leadership Academy kindergartner put the practice in
        five-year-old terms: "I am grateful for all the people in the world."
      - >-
        Three statewide roundtable convenings brought Michigan's education leaders into
        one community of practice — eight leaders at the first, more than 40 by the
        second — and kindergarten teacher Karen Burns turned her class's first mindful
        year into a poem, "Mindful Mission," tracing the arc from "Screaming, crying"
        to students taking deep breaths on their own.
    image: '../../assets/images/case-studies/mindful-michigan/approach-press-play.jpg'
    imageAlt: 'An educator starting the day’s audio-guided mindfulness practice for a classroom of students'
    # Four pillar cards carry the model's four operating components; the remaining
    # two (Inspired Innovation, Collaboration and Collective Impact) are named in
    # the body paragraphs above with their concrete examples.
    pillars:
      - icon: 'play'
        title: 'One daily practice, 180 days a year'
        text: >-
          Every setting starts from the same foundation: sequenced, 10-minute
          audio-guided practices, every school day — a universal, Tier 1 support for
          every student and educator, no screening or identification required. Easy
          to use, with transition-responsive practices that together promote
          wellbeing, academic achievement, and school safety.
      - icon: 'chart'
        title: 'Data-driven from day one'
        text: >-
          Real-time usage data and meaningful-impact evaluation guide decisions —
          including data reviews with the initiative's biggest partners and a
          statewide public-records analysis comparing Inner Explorer schools with
          demographically matched peers.
      - icon: 'heart'
        title: 'Home and school practice together'
        text: >-
          The model links home and school for family engagement and transparency.
          Southfield's growth came from students, staff, and families joining the same
          daily practice — not from students practicing alone.
      - icon: 'compass'
        title: 'Equity by design'
        text: >-
          The model deliberately includes youth in juvenile detention centers,
          foster-care group homes, early learning centers, out-of-school-time
          programs, and children's hospitals — with practices available in English
          and Spanish.

timeline:
  eyebrow: 'The Rollout'
  heading: 'From one charter school to the nation’s first required-practice district'
  phases:
    - date: '2021–22'
      tag: 'Early proof'
      title: 'Fortis Academy goes school-wide'
      text: "At Fortis Academy in Ypsilanti — the first Inner Explorer school in National Heritage Academies' 100-school charter network — daily practice is already school-wide. Across two years of high usage, proficiency improves more than 30%, and other NHA schools follow, embedding the program in their own budgets."
    - date: 'Year one'
      tag: 'Scale'
      title: '202 schools and centers start practicing'
      text: 'Following a tipping-point growth strategy, Mindful Michigan reaches 202 schools and centers in its first grant year — school districts, charter networks, foster-care group homes, out-of-school-time providers, park districts, and juvenile detention centers — at no cost to schools.'
    - date: '2022–23'
      tag: 'Proof'
      title: "The initiative's analysis finds 19.7% growth vs. 0.01% for matched peers"
      text: "Mindful Michigan's analysis of public statewide records compares schools using Inner Explorer consistently with demographically matched peers: proficiency grows 19.7% year over year at Inner Explorer schools, against 0.01% at peer schools — and attendance improves faster too, 18.1% vs. 16.5%."
    - date: 'Year two'
      tag: 'Deepen'
      title: 'Southfield becomes the first required-practice district in the nation'
      text: 'Championed by district leader Paula Lightsey, Southfield Public Schools commits district-wide: daily mindful practice required for students and staff — administrators, bus drivers, janitors, and office staff included — backed by a three-year subscription and training for nearly 200 educators. Usage rises 800% in a single year as students, staff, and families join the same system-wide practice.'
    - date: '2024'
      tag: 'Momentum'
      title: 'National recognition arrives'
      text: "NPR profiles Inner Explorer's press-play daily practice as an easier way for schools to bring mindfulness into the classroom; a Michigan feature on mindfulness in Head Start preschools highlights Mindful Michigan and Inner Explorer's daily practice for preschoolers; and the University of Pennsylvania's Center for High Impact Philanthropy includes Inner Explorer as one of nine featured nonprofits in its 2024 High Impact Giving Toolkit."

