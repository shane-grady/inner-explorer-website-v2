# Mindful Michigan — case study content. One file → the whole
# /case-studies/mindful-michigan page.
#
# Transferred from the legacy site (innerexplorer.com/case-study7.html) and its PDF
# ("Mindful Michigan Project Highlights" — the initiative's funder report, 11pp).
# The legacy source is a first-person FUNDER REPORT addressed to the Fetzer
# Institute; this page reframes it as a case study. All reach figures, the
# statewide academic analysis, the Southfield and Fortis stories, and every quote
# are real source content. Fundraising asks in the source (the GreenLight
# Georgia/North Carolina pipeline, requests for Fetzer introductions) were
# deliberately dropped, not carried.
#
# Content-owner decision (2026-06-10): REAL CONTENT ONLY — no representative
# filler. The trust-rating block is omitted and all six voices are verbatim
# source quotes from named people (three IN-SPIRE champions, two educators; the
# kindergartner's line and Karen Burns' poem are carried in body copy).
#
# CLAIM DISCIPLINE: the 19.7% figure is the initiative's own analysis of public
# statewide records (growth vs. demographically matched peer schools, 2021-22 →
# 2022-23). It is always framed as growth-over-growth (19.7% vs 0.01%), never as
# "IE schools score higher than peers" — peers were higher in absolute terms,
# and the charts show that honestly. The source table does not define the index
# units; values are presented "as reported".
# SPELLING NOTE: the source spells the Southfield school both "Adler" and
# "Alder"; the real school is Adler Elementary (Southfield Public Schools) —
# "Adler" is used throughout.
#
# Photography: AI-generated brand imagery (Higgsfield / GPT Image 2, 2026-06-10).
# The two PORTRAITS are stand-ins for real named people and carry PUBLISH GATE
# comments below.
