# FAQ — real buyer questions (model, results, requirements, training, funding)
# answered from established facts only; rendered with the shared FAQAccordion.
# Deliberately NO FAQPage JSON-LD (restricted to gov/health rich results since 2023).
faq:
  eyebrow: 'FAQ'
  titleHtml: 'The questions <em>state and district leaders ask.</em>'
  intro: >-
    Direct answers from Mindful Michigan's first two years — what the model includes,
    what the data shows, what it asks of schools, and how districts fund the practice
    today.
  items:
    - q: 'What is the Mindful Michigan Model?'
      a: >-
        The Mindful Michigan Model is the first-of-its-kind statewide model for
        mindful systems change in education, built on Inner Explorer's evidence-based
        daily practice. Six components work together: a foundational daily mindful
        practice (180 days of sequenced, 10-minute audio-guided practices),
        data-driven research, an inter-generational approach linking home and school,
        intentional equity and inclusion, inspired innovation, and collaboration for
        collective impact across public and private partners.
    - q: 'What academic results did Michigan schools see?'
      a: >-
        In Mindful Michigan's analysis of public statewide records, schools using
        Inner Explorer consistently grew academic proficiency 19.7% from 2021–22 to
        2022–23 while demographically matched peer schools grew 0.01% — and attendance
        improved faster too (18.1% vs. 16.5%). Inner Explorer schools entered the year
        behind their matched peers and remained below them in absolute terms; what
        changed was the rate of growth. At Fortis Academy in Ypsilanti, proficiency
        improved more than 30% across two years of high usage.
    - q: 'Does mindfulness improve academic achievement in schools?'
      a: >-
        Independent meta-analyses find that participation in school-based social and
        emotional learning (SEL) is associated with academic gains — strongest in
        elementary grades and in programs running more than four months; the Mindful
        Michigan Model's foundational practice runs daily for 180 school days. This
        case study's own evidence is an association, not a causal claim: the 19.7%
        vs. 0.01% proficiency growth comparison (2021–22 to 2022–23) is Mindful
        Michigan's own analysis of public statewide records, not an independent study.
    - q: 'What does Southfield Public Schools actually require?'
      a: >-
        Daily mindful practice with Inner Explorer for students and staff — the first
        district in the nation to require it, as the initiative reports — including
        administrators, bus drivers, janitors, and office staff. The district backed
        the commitment with a three-year subscription and training for nearly 200
        educators through MC4ME, Breathe for Change, and Millennium Forum. Usage rose
        800% in a single year.
    - q: 'How much training do educators need to run the daily practice?'
      a: >-
        None beyond pressing play. The practices are fully audio-guided — 180 days,
        sequenced, 10 minutes each — so any classroom, bus depot, or front office can
        practice from day one. Partners like MC4ME and Breathe for Change offer
        optional deeper training for educators who want to grow their own practice.
    - q: 'Who funded Mindful Michigan?'
      a: >-
        The initiative ran on grant funding from national funders and partners —
        including the Fetzer Institute, the Hemera Foundation, and the Skillman
        Foundation — so participating schools and centers started at no cost. A
        growing number of schools now fund the program directly, the way Fortis
        Academy and other National Heritage Academies schools embedded it in their
        own budgets.
    - q: 'How do districts fund a program like this today?'
      a: >-
        Districts typically braid existing streams: Title IV, Part A (Student Support
        and Academic Enrichment) supports work in its "safe and healthy students"
        category, and Michigan districts can look to Section 31n school mental health
        funds, Section 31aa Student Mental Health & Safety Per-Pupil Payments, and
        MiLEAP Out-of-School Time (Section 32n) grants for programs beyond the school
        day. Mindful Michigan itself started schools at no cost through philanthropy,
        and the durable pattern is that districts then sustain the practice in their
        own budgets — the way Southfield backed its district-wide commitment with a
        three-year subscription.

