intro:
  challenge:
    eyebrow: 'The Challenge'
    heading: 'The students with the most to say were the least able to say it'
    body:
      - >-
        In schools and centers across the country, mental health concerns are on the
        rise — and at the same time, students and educators face immense pressure to
        perform academically and close the learning gap left by the pandemic. Cynthia
        Salgado, a behavior specialist at La Joya Independent School District, sees
        what that looks like up close: students are looking for help, and oftentimes
        it plays out through noticeable stress and anxiety, anger and frustration, or
        breaking down emotionally.
      - >-
        For students with disabilities, those challenges are amplified. Many already
        find it difficult to express how they are feeling and advocate for what they
        need — so distress surfaces as behavior long before it surfaces as words.
        The voice is there; what these students need is a dependable way to find it.
      - >-
        There is a reason a stressed student can't simply be taught out of a hard
        moment. Traditional SEL curricula are designed to activate the prefrontal
        cortex — the part of the brain associated with learning. But when the brain
        is stressed, it cannot access what it cognitively knows, and it cannot absorb
        new information. Something had to lower the stress first.
    image: '../../assets/images/case-studies/la-joya-isd/challenge-overwhelmed.jpg'
    imageAlt: 'A student sitting at a classroom desk, overwhelmed during an academic lesson'
    stat:
      {
        value: '0',
        label: 'new information a stressed brain can absorb — the stress has to come down first',
      }
  approach:
    eyebrow: 'The Approach'
    heading: 'Daily mindfulness, twice a day, in the language of the classroom'
    body:
      - >-
        Mindfulness-Based Social Emotional Learning (MBSEL) is social-emotional
        learning built on daily mindfulness practice. Inner Explorer co-founder
        Dr. Laura Bakosh coined the term after establishing that daily practice
        offers foundational support for the five core competencies of social and
        emotional learning: self-awareness, self-management, social awareness,
        relationship skills, and responsible decision-making. La Joya educators use
        MBSEL through Inner Explorer as a preventative, whole-class practice — the
        Tier 1, universal layer in a multi-tiered system of supports (MTSS) — not a
        reaction to crisis. By targeting stress first, the daily practice opens the
        door the traditional curriculum knocks on.
      - >-
        In Judith Lopez Guerra's special education classroom, the audio-guided
        practice runs twice a day — in the morning to prepare for academics, and at
        the end of the school day before going home — in English and in Spanish.
        The lights dim, the practice plays, and Judith practices right alongside her
        students. Through Inner Explorer, she, her co-teachers, and colleagues have
        noticed a remarkable difference in student behavior, made evident by a
        drastic decrease in the number of reported behavioral issues.
    image: '../../assets/images/case-studies/la-joya-isd/approach-press-play.jpg'
    imageAlt: 'A teacher starting an audio-guided mindfulness practice for her special education class'
    # The four cards are the source case study's own best practices for using
    # Inner Explorer in a special education classroom — kept under their themes.
    pillars:
      - icon: 'calendar'
        title: 'A set time, twice a day'
        text: >-
          A predictable routine helps students know what to expect. Judith's
          classroom practices twice a day — in the morning to prepare for academics,
          and at the end of the school day before going home — with the lights dimmed
          to reduce distractions and signal that it is time for mindfulness.
      - icon: 'heart'
        title: 'Adults practice too'
        text: >-
          Judith participates in every practice alongside her students. Practicing
          together removes the stigma and helps students feel safe. Inner Explorer
          reports improved well-being and 43% less stress among teachers who
          practice mindfulness.
      - icon: 'repeat'
        title: "A reset, right when it's needed"
        text: >-
          The set times are the backbone, not the limit. "If we are in the middle of
          a math lesson and they become overwhelmed and can't focus, I will offer to
          do a session right then and there — or the students will ask me to play an
          Inner Explorer practice," Judith says. The mid-lesson reset gives students
          a self-regulation strategy for settling and refocusing on the task at hand.
      - icon: 'palette'
        title: 'Reflect, draw, share'
        text: >-
          Every practice includes time for independent reflection. Judith created a
          corner display where students can hang their reflection drawings or journal
          entries if they choose — encouraging self-expression and offering a window
          into their lives beyond the classroom.

