# FAQ — real buyer questions (special-ed fit, language, training, family reach,
# funding) answered from established facts only; rendered with the shared
# FAQAccordion. Deliberately NO FAQPage JSON-LD (gov/health-restricted since 2023).
faq:
  eyebrow: 'FAQ'
  titleHtml: 'The questions <em>special education leaders ask about this story.</em>'
  intro: >-
    Direct answers from La Joya ISD's classrooms — what the twice-daily practice
    asked of educators, how it works for students with disabilities, and how
    families practice along.
  items:
    - q: "How did La Joya ISD's special education classrooms reduce behavior issues?"
      a: >-
        Reported behavior issues in La Joya ISD's special education classrooms fell
        85% with Inner Explorer's daily mindfulness practice, delivered in English
        and Spanish. The routine behind the number: an audio-guided practice at a set
        time twice a day — morning and end of day — with the lights dimmed and
        educators practicing alongside students.
    - q: 'Does daily mindfulness work for students with disabilities?'
      a: >-
        At La Joya it changed the classroom. Students with disabilities often find it
        difficult to express how they are feeling and advocate for what they need —
        and after building a daily practice, "students who were once extremely shy
        learn to ask for what they need," says special education teacher Judith Lopez
        Guerra. That growth in self-advocacy is supported by structure: a set time,
        dimmed lights, and the option to draw or journal during reflection meet
        students where they are.
    - q: 'Is the daily practice available in Spanish?'
      a: >-
        Yes. Judith Lopez Guerra practices daily mindfulness in English and in
        Spanish in her La Joya classroom with Inner Explorer — so the practice
        reaches students in the language of their classroom and their home.
    - q: 'What is Mindfulness-Based Social Emotional Learning (MBSEL)?'
      a: >-
        MBSEL is social-emotional learning built on daily mindfulness practice
        rather than occasional lessons — a term coined by Inner Explorer co-founder
        Dr. Laura Bakosh. The daily practice targets stress first, because a
        stressed brain cannot access what it cognitively knows or absorb new
        information.
    - q: 'How much training did teachers need to run the practice?'
      a: >-
        None beyond pressing play — the practices are fully audio-guided. At La Joya,
        Judith and her co-teachers practice alongside their students, which removes
        stigma and helps students feel safe. Educators also get their own support:
        the Inner Explorer Educator Well-Being Series supplements the classroom
        practice with tools built specifically for teachers.
    - q: 'Can families practice at home with their students?'
      a: >-
        Yes. Families download the Inner Explorer HOME app and use its Tune In
        feature to listen to the classroom's daily practice in real time — or
        whenever their schedule allows. Students and families can then talk about
        what came up during the practice at home.
    - q: 'How can a district fund a program like this?'
      a: >-
        Districts typically fund daily mindfulness practice in special education
        settings through IDEA Part B — the lane that already supports their special
        education programming — or through Title IV, Part A (Student Support and
        Academic Enrichment). Districts that want to extend the practice to students
        not yet identified for special education can use coordinated early
        intervening services (CEIS). Our partnerships team helps districts match
        Inner Explorer to the right funding source, including state school
        mental-health initiatives.

