intro:
  challenge:
    eyebrow: 'The Challenge'
    heading: 'Teens named the problem; far fewer knew how to cope with it'
    body:
      - >-
        At John Marshall High School in Los Angeles, California, the numbers behind teen
        mental health were impossible to ignore: 70% of teens say anxiety and depression
        are a major problem among people their age, yet far fewer report knowing how to
        cope. Stress negatively impacts their lives, friendships, school performance,
        relationships with family members, and their long-term success.
      - >-
        Thanks to a grant from LG Electronics USA, students at John Marshall began
        practicing daily mindfulness with Inner Explorer as a preventative, Tier 1
        mental health measure — universal support that reaches every student before a
        crisis, not after one. The grant came through LG's Experience Happiness
        initiative, which set out in 2018 to bring Sustainable Happiness Skills to 5.5
        million U.S. teens.
      - >-
        Educator Elena Kelly introduced the routine, and students started practicing
        with Inner Explorer at the beginning of each school day. Over time, their daily
        practice in the classroom inspired something larger: a student-led mental
        health initiative.
    image: '../../assets/images/case-studies/john-marshall-hs/challenge-teen-stress.jpg'
    imageAlt: 'A high school student pausing alone at the edge of a busy corridor, carrying the weight of the school day'
    stat:
      {
        value: '70%',
        label: 'of teens say anxiety and depression are a major problem among people their age',
      }
  approach:
    eyebrow: 'The Approach'
    heading: 'Students took the daily practice and built a movement around it'
    body:
      - >-
        Using mindfulness as the foundation, John Marshall students created the Wellness
        Advisory — a student-led organization that uses the LG Electronics Six
        Sustainable Happiness Skills to improve the mental health and well-being of the
        whole school community.
      - >-
        Mindfulness is foundational to the other five skills — Human Connection,
        Gratitude, Positive Outlook, Purpose, and Generosity. As defined by the LG
        Experience Happiness initiative and identified by the Greater Good Science
        Center at UC Berkeley, these are research-backed skills that can be taught,
        learned, and practiced to improve happiness and well-being.
      # Lisa Grady attribution verified 2026-06-09: the title (Chief Strategy Officer)
      # is current at innerexplorer.com/ie-team, where she is listed as "Lisa G. Moore".
      # Quote attribution stays as published in the legacy case study; an optional
      # "(now Lisa G. Moore)" rendering is the content owner's call.
      - >-
        "Success in school is linked to greater opportunities in life. One of the most
        effective practices used to lead children towards their highest potential by
        bolstering academic performance, creativity, social and emotional aptitude, and
        well-being is mindfulness," shares Inner Explorer Chief Strategy Officer Lisa
        Grady.
    image: '../../assets/images/case-studies/john-marshall-hs/approach-daily-practice.jpg'
    imageAlt: 'High school students at their desks practicing an audio-guided mindfulness exercise at the start of the school day'
    # Card titles are descriptive takeaways (what skimming administrators retain);
    # the source material's own initiatives — daily practice, the Advisory, the
    # Wellness Room, the community rituals — are each named verbatim in the text.
    pillars:
      - icon: 'calendar'
        title: 'The day starts with practice'
        text: >-
          Students practice mindfulness with Inner Explorer at the beginning of each
          school day — 5–10 minutes, audio-guided, nothing for educators to prepare.
          The routine came first; the movement grew out of it.
      - icon: 'heart'
        title: 'Student-led from the start'
        text: >-
          The Wellness Advisory is created and run by students. Members carry the
          skills onto campus — checking in on classmates, modeling a moment of
          mindfulness — and every Advisory meeting begins with an Inner Explorer
          practice.
      - icon: 'compass'
        title: 'A dedicated Wellness Room'
        text: >-
          Students opened a dedicated Wellness Room at John Marshall High School — a
          safe space to practice mindfulness and hold Advisory meetings, and a
          permanent, visible home for well-being on campus.
      - icon: 'palette'
        title: 'Rituals that build belonging'
        text: >-
          "Say Hey" Days encourage students and staff to greet people they have never
          talked to before or eat lunch with them; the "You Have a Friend" effort sent
          letters to elderly neighbors isolated during the pandemic.

