# FAQ — real buyer questions (training, cost, scale, evidence) answered from
# established facts only; rendered with the shared FAQAccordion. Deliberately NO
# FAQPage JSON-LD (restricted to gov/health rich results since 2023).
faq:
  eyebrow: 'FAQ'
  titleHtml: 'The questions <em>school and district leaders ask about this story.</em>'
  intro: >-
    Direct answers from John Marshall High School's implementation — what the daily
    practice asked of educators, what it cost, and how it scaled across LAUSD.
  items:
    - q: 'How did John Marshall High School improve teen mental health with mindfulness?'
      a: >-
        With a daily 5–10 minute audio-guided Inner Explorer practice at the beginning
        of each school day, introduced by educator Elena Kelly and funded by a grant
        from LG Electronics USA. The classroom routine inspired students to found the
        Wellness Advisory — and when surveyed, 91% of students said they wanted to keep
        practicing.
    - q: 'What is the Wellness Advisory?'
      a: >-
        A student-led mental health club at John Marshall High School that uses the LG
        Electronics Six Sustainable Happiness Skills to improve the well-being of the
        whole school community. Its projects include a dedicated Wellness Room, "Say
        Hey" Days, and the "You Have a Friend" letter-writing effort — and every
        meeting begins with an Inner Explorer practice.
    - q: 'What are the Six Sustainable Happiness Skills?'
      a: >-
        Mindfulness, Human Connection, Gratitude, Positive Outlook, Purpose, and
        Generosity — research-backed skills that can be taught, learned, and practiced
        to improve happiness and well-being, as defined by the LG Experience Happiness
        initiative and identified by the Greater Good Science Center at UC Berkeley.
        Mindfulness is the foundation the other five build on.
    - q: 'Did academics improve too?'
      a: >-
        Yes. Between 2017–18, when the Wellness Advisory started, and 2018–19, the
        number of John Marshall students exceeding expectations rose 15% in English
        Language Arts and 19% in Math. That tracks the broader evidence: across 213
        studies involving over 270,000 students, SEL programs raised academic
        performance by 11 percentile points — a finding reaffirmed by a 2023
        meta-analysis of 424 studies involving 575,361 students. Inner Explorer is
        listed in the CASEL Program Guide as a Designated SEL-Supportive Program.
    - q: 'What did the program cost the school?'
      a: >-
        Nothing — John Marshall's implementation was funded by a grant from LG
        Electronics USA through its Experience Happiness initiative. Today, districts
        typically fund Inner Explorer through sources like Title IV-A (Safe and Healthy
        Students) and, in California, LCFF/LCAP dollars or community-schools grants —
        our partnerships team helps identify the right one.
    - q: 'Did it scale beyond one school?'
      a: >-
        Yes. Los Angeles Unified implemented the Wellness Advisory concept in other
        schools, and following the success that mindfulness continued to have at John
        Marshall, the district signed up to provide Inner Explorer access in every
        school — roughly 1,100 LAUSD schools at the time.

