# FAQ — real buyer questions (results, the Quest, starting a club, funding, training)
# answered from established facts only; rendered with the shared FAQAccordion.
# Deliberately NO FAQPage JSON-LD (restricted to gov/health rich results since 2023).
faq:
  eyebrow: 'FAQ'
  titleHtml: 'The questions <em>school leaders ask about this story.</em>'
  intro: >-
    Direct answers from Dwight Morrow's experience — what the club asked of educators,
    what the 21-Day Quest changed, and how to fund a program like this.
  items:
    - q: 'How did Dwight Morrow High School increase mindfulness engagement by 371%?'
      a: >-
        Through a student-led push: the school's Project Happiness Club promoted Inner
        Explorer's 21-Day Quest to build a daily practice habit. Quest participants'
        engagement rose 371% on average, with active usage climbing from 14.34% to
        53.23% — a habit shift from practicing about once a week to three or four
        times a week.
    - q: 'What is the Inner Explorer 21-Day Quest?'
      a: >-
        A 21-day challenge designed to instill the habit of daily audio-guided
        mindfulness practice as a preventative mental health tool — at Dwight Morrow,
        Quest participants went from practicing about once a week to three or four
        times a week. Consistent practice helps students, staff, and families gain
        skills like self-awareness and emotional regulation — and when practiced
        daily, Inner Explorer has been shown to reduce stress and improve average
        G.P.A. and reading, math, and science grades.
    - q: 'How do you start a mental health club at your high school?'
      a: >-
        Dwight Morrow's club shares four findings: get student buy-in (student leaders
        make it safe for peers to open up), expand on student strengths (every member
        holds a role built on a skill they already have), make the case for MBSEL to
        school administration, and communicate the long-term impact from the start so
        students stay motivated.
    - q: 'What does a student mental health club do?'
      a: >-
        At Dwight Morrow, the school's Project Happiness Club promoted Inner
        Explorer's 21-Day Quest to classmates, wrote 300+ thank-you notes to school
        staff, hosted a Q&A for incoming underclassmen, and planned an end-of-year
        reflection survey on how the club could best support students the following
        year. One member, a student artist, creates an art piece illustrating a
        positive message of the week, shared through the school announcements.
    - q: 'Do student-led mental health clubs actually make a difference?'
      a: >-
        After Dwight Morrow High School's student-run Project Happiness Club promoted
        Inner Explorer's 21-Day Quest, participants' engagement with the daily
        mindfulness practice rose 371% on average — active usage grew from 14.34% to
        53.23%. That is an engagement result, not a clinical outcome — what this
        peer-led push measurably changed was whether students chose to practice, with
        frequency growing from about once a week to three or four times a week.
    - q: 'How can a school fund a program like this?'
      a: >-
        Dwight Morrow's work grew out of an LG Electronics partnership — Mrs. Conceicao
        is an LG Electronics Superhero Teacher. For schools funding this today, the
        lead federal stream is Title IV, Part A (Student Support and Academic
        Enrichment), whose Safe and Healthy Students category covers mental-health and
        SEL programming, alongside Title I, IDEA, and state school mental-health
        initiatives — the COVID relief funds that supported this era expired in 2024.
        Most of these sources ask for evidence-based programs (ESSA evidence tiers),
        and our partnerships team helps schools match Inner Explorer's evidence base
        to a funding source's requirements.
    - q: 'Do teachers need special training to bring MBSEL into a classroom?'
      a: >-
        No — Inner Explorer's practices are fully audio-guided, so educators simply
        press play. That's how it started at Dwight Morrow: one teacher practicing
        with her own students, no mandate, before students took the mission
        school-wide.

