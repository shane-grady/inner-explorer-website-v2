intro:
  challenge:
    eyebrow: 'The Challenge'
    heading: 'A youth mental-health crisis that adults could not solve alone'
    body:
      - >-
        Youth mental health was suffering before the pandemic: 1 in 6 U.S. youth ages
        6–17 experiences a mental health disorder each year. The COVID-19 pandemic
        added a layer of complexity to these already critical issues — school closures,
        social isolation, and financial hardship for families.
      - >-
        The 2021 State of Mental Health in America report put numbers on the trend:
        9.7% of U.S. youth live with severe major depression, up from 9.2% in the prior
        year's dataset — and the rate is highest among youth who identify as more than
        one race, at 12.4%. "In order to get to the academic success, we have to start
        with the social and emotional well-being and make sure that not only our
        students, but also our educators, are able to come back and that their social
        and emotional well-being guides the decisions we're making," said
        then-U.S. Secretary of Education Miguel Cardona in an interview at the time.
      - >-
        At Dwight Morrow High School, a public high school in Englewood, New Jersey,
        educator Melissa Conceicao recognized the need to address youth mental health
        in school — and that students may feel embarrassed or hesitant to talk about
        it. Reaching them would take more than another adult-led program.
    image: '../../assets/images/case-studies/dwight-morrow/challenge-quiet-weight.jpg'
    imageAlt: 'A high school student sitting alone at a desk, carrying a quiet weight'
    stat:
      {
        value: '1 in 6',
        label: 'U.S. youth ages 6–17 experience a mental health disorder each year',
      }
  approach:
    eyebrow: 'The Approach'
    heading: 'From one classroom’s practice to a student-run movement'
    body:
      - >-
        Dwight Morrow High School's mindfulness practice was voluntary and student-led
        — never mandated, but modeled by one teacher and then chosen and promoted by
        students themselves. It began with Melissa Conceicao, an LG Electronics
        Superhero Teacher at the school, practicing Inner Explorer's Mindfulness-Based
        Social Emotional Learning (MBSEL) programs — daily audio-guided practices an
        educator can run by simply pressing play — in her own classroom. Over time,
        students were inspired to lead mental health and well-being initiatives of
        their own, and with the support of Principal Ben Suro, Mrs. Conceicao and
        several students kickstarted the school's Project Happiness Club, a
        student-run, peer-to-peer club on a mission to empower their school community
        to recognize and prioritize mental health.
      - >-
        The club's first initiative promoted the Inner Explorer 21-Day Quest, with the
        goal of instilling the habit of daily mindfulness practice as a preventative
        mental health tool. Many of the club's projects draw on the six sustainable
        happiness skills defined by the LG Experience Happiness initiative —
        mindfulness, generosity, gratitude, human connection, purpose, and positive
        outlook. The club's mission also aligned with a nationwide push following the
        pandemic to integrate mental health resources into education: at the time, a
        portion of COVID education relief funding could be dedicated to mental health
        resources, including MBSEL programs such as Inner Explorer.
    image: '../../assets/images/case-studies/dwight-morrow/approach-club-leaders.jpg'
    imageAlt: 'Student leaders running a Project Happiness Club meeting in a high school classroom'
    # The four cards are the source case study's own "four key findings" for
    # starting a youth well-being club — kept under their original names.
    pillars:
      - icon: 'heart'
        title: 'Get student buy-in'
        text: >-
          Getting students to buy in starts with peers going first: students may feel
          embarrassed or hesitant to talk about mental health, but when student leaders
          step up and set an example, they create a safe space for their peers to
          express themselves too. "The perception of mental health begins to change,"
          shares Principal Suro — stigma reduction that opens the door to help-seeking.
      - icon: 'palette'
        title: 'Expand on student strengths'
        text: >-
          Every club member holds a role that develops a skill they already have. One
          student artist creates an art piece illustrating a positive message of the
          week, shared via the school announcements. Playing to their strengths gives
          students purpose and fuels their passion behind the mission.
      - icon: 'chart'
        title: 'Make the case to administration'
        text: >-
          MBSEL provides a pathway to key skills like self-awareness and emotional
          regulation, and daily practice has been shown to reduce stress and amplify
          learning. In MTSS terms, daily practice is a Tier 1 universal support —
          prevention for every student, not a referral-based service. Communicating
          those benefits to school administration is the first step in bringing a
          mental health club to your school.
      - icon: 'compass'
        title: 'Communicate the long-term impact'
        text: >-
          Students are used to instant gratification — "they have to understand the
          'why' behind what they are doing, otherwise they will feel discouraged if
          they do not see results right away," shares Mrs. Conceicao. Naming the
          long-term impact from the get-go keeps students motivated.

