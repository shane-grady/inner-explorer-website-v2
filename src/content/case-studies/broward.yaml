seoTitle: 'Broward County Case Study — Inner Explorer'
seoDescription: >-
  How Broward County Public Schools turned a five-minute daily mindfulness practice
  into a district-wide culture — reaching 253K students across 241 schools, with a
  65% drop in behavioral outbursts.
