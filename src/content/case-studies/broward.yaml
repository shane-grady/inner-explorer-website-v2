intro:
  challenge:
    eyebrow: 'The Challenge'
    heading: 'A district under pressure, looking for something that scales'
    body:
      - >-
        Coming out of a turbulent few years, Broward County's leadership saw the data they
        feared most: rising behavioral referrals, classroom disruptions eating into
        instruction, and educators reporting burnout at record levels. Existing SEL programs
        were well-intentioned but uneven — adopted in pockets, hard to measure, and quick to
        fade once the launch energy wore off.
      - >-
        The district needed something different: a practice simple enough for any teacher to
        lead on day one, consistent enough to build a habit, and measurable enough to prove
        its worth to a board accountable for 250,000 students.
    image: '../../assets/images/case-studies/broward/challenge-classroom.jpg'
    imageAlt: 'A teacher at the chalkboard with students at desks'
    stat: { value: '1 in 3', label: 'teachers reported chronic stress before rollout' }
  approach:
    eyebrow: 'The Approach'
    heading: 'Five minutes a day, led by the teacher already in the room'
    body:
      - >-
        Inner Explorer's premise was disarmingly simple: a daily, audio-guided practice that
        any educator can press play on — no certification, no prep, no new staff. Broward
        started with a focused pilot across 12 schools, pairing the practice with the District
        Dashboard so leaders could watch adoption climb in real time.
      - >-
        What spread wasn't a mandate — it was a morning ritual. Teachers told other teachers.
        Principals saw calmer hallways. Within three semesters the pilot became a district-wide
        standard, woven into the start of the school day.
    image: '../../assets/images/case-studies/broward/approach-student-desk.jpg'
    imageAlt: 'A student working at a desk with the teacher nearby'
    pillars:
      - icon: 'play'
        title: "Press play, that's it"
        text: 'Daily 5–10 minute audio practices any teacher can lead, with zero prep.'
      - icon: 'repeat'
        title: 'Built for the habit'
        text: 'Themed multi-day series turn one good morning into a year-long routine.'
      - icon: 'chart'
        title: 'Visible from the top'
        text: 'The District Dashboard turns adoption and engagement into reportable data.'

timeline:
  eyebrow: 'The Rollout'
  heading: 'From a 12-school pilot to district-wide in three semesters'
  phases:
    - date: 'Fall 2021'
      tag: 'Pilot'
      title: '12 schools, one shared morning'
      text: 'A focused pilot launches across a cross-section of elementary and middle schools. Leadership baselines behavior and attendance data before day one.'
    - date: 'Spring 2022'
      tag: 'Proof'
      title: 'Early signal, fast word-of-mouth'
      text: 'Pilot schools post measurable drops in office referrals. Teachers in non-pilot schools begin asking for access. The dashboard makes the momentum undeniable.'
    - date: 'Fall 2022'
      tag: 'Scale'
      title: 'Expansion to every elementary school'
      text: "Inner Explorer rolls out across all elementary campuses, backed by a district-wide educator onboarding and a 'first 10 days' practice guide."
    - date: '2023–24'
      tag: 'Embed'
      title: 'Part of the school day, PreK–12'
      text: 'Practice is written into the master schedule across grade bands. Family practices extend the routine home. Coaches use dashboard insights to support low-adoption sites.'
    - date: '2025'
      tag: 'Sustain'
      title: 'A culture, not a program'
      text: 'Four years in, daily practice is simply how the day begins. Broward shares its playbook with peer districts across Florida.'

