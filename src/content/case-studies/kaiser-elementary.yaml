intro:
  challenge:
    eyebrow: 'The Challenge'
    heading: 'The opioid crisis followed students into the classroom'
    body:
      - >-
        West Virginia had the nation's highest drug-overdose death rate — 51.5 per
        100,000 people in 2018, against a national average of 21.7 — after years of
        exceptionally high opioid prescribing: 69 prescriptions written for every 100
        residents, compared with the U.S. rate of 51.4.
      - >-
        The addiction crisis rippled through the community around Henry J. Kaiser
        Elementary in Ravenswood — disrupting families and straining public
        institutions. The Nation reported that a quarter of the students in one
        second-grade class were being raised by grandparents or in foster care. West
        Virginia counties with the highest rates of opioid deaths also tended to see
        higher rates of child abuse and neglect, and the CDC is blunt about what
        follows: adverse childhood experiences (ACEs) like these can have lasting,
        negative effects on children's health, well-being, and opportunity well into
        adulthood.
      - >-
        In July 2018, The Nation profiled Henry J. Kaiser Elementary in "These Kids Are
        Watching Their Parents Die," reporting that Principal Amber Hardman and other
        teachers had noticed "a marked uptick in behavioral problems—students who are
        defiant, who throw chairs and tip over tables or bolt from the classroom." The
        school had outstanding teachers and social-emotional learning (SEL) programs in
        place, yet students carried chronic stress from poverty, family dislocation,
        addiction, overdose death, and incarceration into the classroom each morning. As
        educator Christy Archer put it: "We feel hopeless. We want to help these
        children read, but they can't … because of things beyond our control."
    image: '../../assets/images/case-studies/kaiser-elementary/challenge-supported-student.jpg'
    imageAlt: 'A teacher gently supporting a young student at a desk in an early-elementary classroom'
    stat:
      {
        value: '51.5',
        label: "overdose deaths per 100,000 West Virginians in 2018 — the nation's highest rate",
      }
  approach:
    eyebrow: 'The Approach'
    heading: 'Ten minutes every morning — the whole school together'
    body:
      - >-
        Inner Explorer reached out to Principal Hardman in response to The Nation's
        profile of Henry J. Kaiser Elementary, to see if its daily mindfulness program
        could help. "We were struggling … classrooms were taken over by behavior
        issues," Hardman said. "Kids were exposed to so much trauma that they were
        simply not ready for academics. We desperately needed a solution and tools but
        we lacked resources. Just as I started to look into trauma sensitive programs,
        Inner Explorer found us!" Through a partnership with LG Electronics, Inner
        Explorer granted the school the program at no charge.
      - >-
        Principal Hardman took a student-centered approach at Henry J. Kaiser
        Elementary: she allocated time in the school schedule for the 10-minute
        audio-guided practices, and the entire school — students and staff — practiced
        together every morning to reach a state of educational "readiness." Rather than
        bolting on another program, the school folded mindfulness into the Positive
        Behavioral Interventions and Supports (PBIS) framework it had used for years:
        daily practice for every student as universal prevention at Tier 1, small
        groups with the counselor or therapist at Tier 2, and one-on-one practice with
        the school-based therapist at Tier 3. Five focus areas — embed, champion,
        adopt, change, and model — made it stick.
    image: '../../assets/images/case-studies/kaiser-elementary/approach-small-group.jpg'
    imageAlt: 'A small group of young students practicing mindfulness with a school counselor'
    # Card titles are descriptive takeaways (what skimming administrators retain);
    # the source taxonomy — embed / champion / adopt / change / model — is named in
    # the approach body paragraph above. "Change" and "Model" fold into the last card.
    pillars:
      - icon: 'calendar'
        title: 'Embedded in the daily schedule'
        text: >-
          Principal Hardman allocated time in the daily curriculum and made the purpose
          clear to staff: mindfulness was a priority. The entire school practiced
          together every morning.
      - icon: 'heart'
        title: 'Champions built momentum'
        text: >-
          The school-based therapist and a lead teacher — both drawn to the approach —
          were selected as champions, and built positive momentum throughout the
          school.
      - icon: 'repeat'
        title: 'Adoption spread by what teachers saw'
        text: >-
          Early adopters noticed improvements in students' emotional regulation and
          attention. Teachers who hadn't bought in watched the changes reach the
          playground — and were grateful for the chance to join in.
      - icon: 'compass'
        title: 'A routine that became a culture'
        text: >-
          Once daily practice was part of the routine, students grew more self-aware,
          regulated, focused, and collaborative — and the practice became a platform
          for connection as students, faculty, and families practiced together every
          day.

