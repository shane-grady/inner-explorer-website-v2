# FAQ — real buyer questions (cost, training, age fit, PBIS fit) answered from
# established facts only; rendered with the shared FAQAccordion. Deliberately NO
# FAQPage JSON-LD (restricted to gov/health rich results since 2023 — the visible
# copy is the asset).
faq:
  eyebrow: 'FAQ'
  titleHtml: 'The questions <em>elementary school leaders ask about this story.</em>'
  intro: >-
    Direct answers from Henry J. Kaiser Elementary's implementation — what the daily
    practice asked of educators, what it cost, and what changed.
  items:
    - q: 'How did Henry J. Kaiser Elementary reduce discipline events by 77%?'
      a: >-
        By adding one consistent routine: a 10-minute audio-guided Inner Explorer
        mindfulness practice every morning, practiced by the whole school — students
        and staff together — and woven into the school's existing PBIS framework.
        Total discipline events fell from 82 in March 2019 to 19 in March 2020.
    - q: 'Does daily mindfulness work for students as young as PreK?'
      a: >-
        Henry J. Kaiser ran the practice school-wide with 370 students in grades PreK
        through 2nd. In one year, discipline events fell 77%, the share of students
        reading at or above grade level climbed from 17% to 48%, and math proficiency
        rose from 8% to 36%.
    - q: 'How does Inner Explorer fit into a PBIS or MTSS framework?'
      a: >-
        As a universal Tier 1 support: every student and staff member practices
        together daily. Kaiser added small-group practice with the counselor or
        therapist at Tier 2, and one-on-one practice in therapy sessions at Tier 3 —
        the same tiered structure the school already used.
    - q: 'Can mindfulness help students with trauma?'
      a: >-
        At Henry J. Kaiser Elementary, the daily practice was adopted as a support for
        students carrying chronic stress — not as a treatment for trauma. Principal
        Amber Hardman had just begun looking into trauma-sensitive programs when Inner
        Explorer reached out, and the school delivered the practice inside the PBIS
        tiers it already used — whole-school practice at Tier 1 through one-on-one
        sessions with the school-based therapist at Tier 3. The outcomes are the
        school-reported figures on this page: discipline events fell 77%, from 82 to
        19, in one year.
    - q: 'How much training did teachers need to run the daily practice?'
      a: >-
        None beyond pressing play. The practices are fully audio-guided — no prep, no
        script, no curriculum to deliver. At Kaiser, educators practiced alongside
        their students every morning, which is part of why the routine stuck.
    - q: 'What did the program cost the school?'
      a: >-
        Nothing. Through a partnership with LG Electronics, Inner Explorer granted
        Henry J. Kaiser Elementary the program at no charge — and the school went on to
        save an estimated $22,600 a year as fewer students needed reading and math
        interventions. Districts typically fund the program through sources like Title
        IV-A (Safe and Healthy Students) and school mental-health funds; small rural
        districts can also draw on the federal Rural Education Achievement Program
        (REAP), and some states direct opioid settlement funds toward school-based
        prevention — our partnerships team helps identify the right one.

