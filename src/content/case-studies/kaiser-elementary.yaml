  dek: >-
    In Ravenswood, West Virginia — the state with the nation's highest drug-overdose
    death rate in 2018 — Henry J. Kaiser Elementary added Inner Explorer's 10-minute
    audio-guided mindfulness practice to every school morning. Within a year, school-wide
    discipline events fell 77%, from 82 to 19, and the share of students reading at grade
    level nearly tripled, from 17% to 48%.
