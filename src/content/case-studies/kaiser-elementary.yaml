# Henry J. Kaiser Elementary School — case study content. One file → the whole
# /case-studies/kaiser-elementary page.
#
# Transferred from the legacy site (innerexplorer.com/case-study1) and its PDF
# ("Henry J Kaiser Elementary School Tackles the Opioid Crisis with Mindfulness",
# images/HJK-Elementary.pdf). All quotes, discipline/academic figures, the LG
# Electronics funding, and the five focus areas are real source content. Items
# marked PUBLISH GATE were written to fill the template (per content owner's
# direction) and need sign-off or real data before publish.
#
# Source-data notes:
# - The PDF is internally inconsistent on 2020 math proficiency: the chart bar
#   reads 36%, the Before/After list reads 38% (8 → 38 is exactly the +375% the
#   school reports; 8 → 36 is +350%). We present the chart values (8% → 36%)
#   and avoid asserting the 375% figure in our own voice.
# - The PDF credits "Anne E. Casey Foundation"; the correct entity is The Annie
#   E. Casey Foundation (cited correctly below).
# - The $22,600/yr savings metric is the sum of the PDF's two figures:
#   ~$11,500/yr (reading interventions) + ~$11,100/yr (math interventions).
#
# Photography: AI-generated brand imagery (Higgsfield / GPT Image 2, 2026-06-09 —
# provenance manifests in /tmp/hjk-imagery/batch_log*.csv from the build session).
# The two PORTRAITS remain stand-ins for real named people and carry PUBLISH GATE
# comments below; the gallery carries a visible representative-imagery note.
#
# LANGUAGE RULES (frozen by the 2026-06-09 content workflow — apply to every edit):
# (a) Condition-first addiction language only: never "addicts", "junkies", "users",
#     "drug abuse(rs)". Use "addiction", "overdose death", "families affected by
#     substance use disorder". ("Child abuse and neglect" is correct standard
#     terminology — do not "fix" it.)
# (b) Mindfulness SUPPORTS students living amid the opioid crisis — it never
#     "tackles", "fights", "heals", or "combats" addiction or trauma. The legacy
#     PDF's "Tackles the Opioid Crisis" framing must never leak into title/H1/dek/
#     social/alt text. Academic gains are school-reported outcomes ALONGSIDE the
#     practice — never claim causation, never import outside statistics (no SEL-ROI
#     multipliers, no CASEL designations, no ESSA tier claims).
