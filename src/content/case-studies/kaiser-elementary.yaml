seoTitle: 'Mindfulness Case Study: 77% Fewer Discipline Events'
seoDescription: >-
  Discipline events fell 77% — from 82 to 19 — in one year at Henry J. Kaiser Elementary
  in West Virginia. How a daily 10-minute mindfulness practice did it.
publishedDate: 2026-06-09
updatedDate: 2026-06-09

