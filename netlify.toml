# Netlify deploy config. pnpm + lockfile are auto-detected via package.json `packageManager`.
[build]
  command = "pnpm build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "24"

# Long-cache Astro's content-hashed assets; they never change for a given hash.
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Baseline security headers for all responses.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"

# X-Robots-Tag: noindex for *.netlify.app hosts (staging / previews / branch deploys)
# is added per-request by netlify/edge-functions/noindex-netlify-host.ts (declared
# inline via its `config` export). [[headers]] here can't condition on Host, and the
# production custom domain must NOT get the header.
